<footer>
    <section id="footer-area">
        <aside class="footer-segment">
            <h4>
                &copy; 2022&ndash;<span id="year"></span> Haopeng Duan |
                Last updated: <span id="last-updated">Loading...</span>
            </h4>
        </aside>
    </section>
</footer>

<script>
    // 自动年份
    document.getElementById("year").textContent =
        new Date().getFullYear();


    // 获取 GitHub 最新提交时间
    fetch("https://api.github.com/repos/hpduan2000/Homepage/commits/main")
        .then(response => {
            if (!response.ok) {
                throw new Error("GitHub API error: " + response.status);
            }
            return response.json();
        })
        .then(data => {
            console.log(data);   // 打开F12查看返回内容
            const date = new Date(
                data.commit.committer.date
            );
            document.getElementById("last-updated").textContent =
                date.toLocaleDateString("en-US", {
                    year: "numeric",
                    month: "long",
                    day: "numeric"
                });
        })
        .catch(error => {
            console.error(error);
            document.getElementById("last-updated").textContent =
                "Unavailable";
        });
</script>
