<footer>
    <section id="footer-area">
        <aside class="footer-segment">
            <h4>&copy; 2022&ndash;2026 Haopeng Duan | Last updated: <span id="last-updated">Loading...</span></h4>
        </aside>
    </section>
</footer>

<script>
    fetch("https://api.github.com/repos/hpduan2000/Homepage/commits?per_page=1")
        .then(response => {
            if (!response.ok) {
                throw new Error("GitHub API error");
            }
            return response.json();
        })
        .then(data => {
            const date = new Date(
                data[0].commit.committer.date
            );
            document.getElementById("last-updated").textContent =
                date.toLocaleDateString("en-US", {
                    year: "numeric",
                    month: "long",
                    day: "numeric"
                });
        })
        .catch(error => {
            document.getElementById("last-updated").textContent =
                "Unavailable";
            console.log(error);
        });
</script>
