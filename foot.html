<footer>
    <section id="footer-area">
        <aside class="footer-segment">
            <h4>&copy; 2022&ndash;<span id="year"></span> Haopeng Duan | Last updated: <span id="last-updated"></span></h4>
        </aside>
    </section>
</footer>

<script>
document.getElementById("year").textContent =
    new Date().getFullYear();

fetch("https://api.github.com/repos/hpduan2000/Homepage/commits/main")
.then(res => res.json())
.then(data => {

    let date = new Date(data.commit.committer.date);

    document.getElementById("last-updated").textContent =
        date.toLocaleDateString("en-US", {
            year: "numeric",
            month: "long",
            day: "numeric"
        });

});
</script>
