<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home | Haopeng Duan</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="shortcut icon" href="images/mydraw.png?v=1">
</head>
<body>
    <div class="container">
        <main class="content">
            <h2>maintenance</h2>
        </main>
    </div>
    <!-- =========================
                Footer
    ========================== -->
    <footer>
        &copy; <span id="year"></span> Haopeng Duan |
        <strong>Last updated: <span id="last-updated">Loading...</span></strong><br>
        <!-- 6250 Applied Science Lane, Vancouver, BC V6T 1Z4, Canada<br> -->
        <img class="visitor-badge" src="https://visitor-badge.laobi.icu/badge?page_id=hpduan2000.Homepage&left_text=Page%20Views&left_color=%23595959&right_color=%231283c3&radius=5&height=23" alt="visitor badge"/>
    </footer>
    <script>
        document.getElementById("year").textContent =
            new Date().getFullYear();
        
        fetch("https://api.github.com/repos/hpduan2000/Homepage/commits")
        .then(response => {
            if (!response.ok) {
                throw new Error(response.status);
            }
            return response.json();
        })
        .then(data => {
            const date = new Date(
                data[0].commit.committer.date
            );
            document.getElementById("last-updated").textContent =
                date.toLocaleDateString("en-US", {
                    year: "numeric",
                    month: "long",
                    day: "numeric"
                });
        })
        .catch(error => {
            console.log(error);
            document.getElementById("last-updated").textContent =
                "Unavailable";
        });
    </script>
</body>
</html>
